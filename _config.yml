# Theme
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "air"

# Site Settings
locale: "en-US"
title: "Computer Science Notes"
subtitle: "Bar-Ilan University"
name: "Hodaya Kash"
description: "Lecture notes for Computer Science degree courses"
url: "https://hodayakashh.github.io"
baseurl: "/BIU-ComputerScience"

# Site Colors
colors:
  background: "#F1F0E8"
  text: "#2D2D2D"
  primary: "#B3C8CF"
  secondary: "#EBE3D5"
  accent: "#8CA7B0"
  border: "#E0E0E0"
  light: "#F8F8F8"

# CSS Settings
sass:
  style: compressed
extra_css:
  - /assets/css/main.css
# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  
# Site Author
author:
  name: "Hodaya Kash"
  avatar: "/assets/images/0Z8A6921.jpg"
  bio: "Computer Science Student at Bar-Ilan University"
  location: "Israel"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hodayakashh"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hodayakashh"

# Reading Files
include:
  - _pages

# Search
search: true
search_full_content: true

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
