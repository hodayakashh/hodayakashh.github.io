remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"
locale: "en-US"
title: "Computer Science Notes"
subtitle: "Bar-Ilan University"
name: "Hodaya Kash"
description: "Lecture notes for Computer Science degree courses"
url: "https://hodayakashh.github.io"
baseurl: "/BIU-ComputerScience"

# Display settings
search: true
search_full_content: true

# Site Author
author:
  name: "Hodaya Kash"
  avatar: 
  bio: "Computer Science Student at Bar-Ilan University"
  location: "Israel"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hodayakashh"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hodayakashh"

# Reading Files
include:
  - _pages

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
